# packages/rag-core/pyproject.toml
[project]
name = "rag-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pymupdf>=1.24",           # PDF parsing
    "sentence-transformers>=3", # Embedding
    "qdrant-client>=1.12",      # Vector store
    "httpx>=0.27",              # Ollama HTTP client
    "jinja2>=3.1",              # Prompt templates
    "pydantic>=2.0",            # Data models
]

[project.optional-dependencies]
reranker = ["sentence-transformers>=3"]  # cross-encoder already included

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_core"]